<!DOCTYPE html>
<html>
<head>

<!-- CONSENT MODE -->
<script>
window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

// ✅ Default consent
gtag('consent', 'default', {
  analytics_storage: 'denied',
  ad_storage: 'denied'
});

// ✅ EARLY CONSENT RESTORE
const analytics = localStorage.getItem("analyticsConsent");
const ads = localStorage.getItem("adsConsent");

if (analytics !== null && ads !== null) {

  gtag('consent', 'update', {

    analytics_storage: analytics === "true" ? 'granted' : 'denied',

    ad_storage: ads === "true" ? 'granted' : 'denied'

  });

}
</script>

<!-- GOOGLE ANALYTICS GTAG.JS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-F3B00ZEY0V"></script>

<script>

window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

gtag('js', new Date());

gtag('config', 'G-F3B00ZEY0V');


// ✅ PAGEVIEW EVENT

gtag('event', 'page_view', {

  page_location: window.location.href,

  page_path: window.location.pathname

});

</script>

<title>BookStore</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  <div class="container nav">

    <h1>📚 BookStore</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Books</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>

<section class="hero">

  <div class="container">

    <h2>Discover Your Next Favorite Book</h2>

    <!-- CUSTOM EVENT -->
    <button id="exploreBtn" onclick="trackExplore()">
      Explore Books
    </button>

  </div>

</section>

<section>

  <div class="container">

    <h2>Featured Books</h2>

    <div class="grid">

      <!-- BOOK 1 -->

      <div class="card">

        <img src="atomic.jpg">

        <h3>Atomic Habits</h3>

        <button onclick="trackAddToCart({
          name: 'Atomic Habits',
          price: '₹499',
          img: 'atomic.jpg'
        })">

          View Details

        </button>

      </div>

      <!-- BOOK 2 -->

      <div class="card">

        <img src="richdad.jpg">

        <h3>Rich Dad Poor Dad</h3>

        <button onclick="trackAddToCart({
          name: 'Rich Dad Poor Dad',
          price: '₹399',
          img: 'richdad.jpg'
        })">

          View Details

        </button>

      </div>

    </div>

  </div>

</section>

<!-- CONSENT BANNER -->

<div id="consent-banner" style="
position: fixed;
bottom: 0;
width: 100%;
background: #222;
color: #fff;
padding: 15px;
z-index: 9999;
">

  <p>Manage your cookie preferences</p>

  <label>
    <input type="checkbox" id="analyticsConsent">
    Enable Analytics Cookies
  </label>

  <br>

  <label>
    <input type="checkbox" id="adsConsent">
    Enable Advertising Cookies
  </label>

  <br><br>

  <button onclick="acceptAll()">Accept All</button>

  <button onclick="rejectAll()">Reject All</button>

  <button onclick="savePreferences()">Save Preferences</button>

</div>

<footer>

  <p>© 2026 BookStore</p>

</footer>

<!-- CUSTOM EVENT FUNCTION -->

<script>

function trackExplore(){

  gtag('event', 'book_explore', {

    button_name: 'Explore Books',

    section_name: 'Homepage',

    category: 'Books'

  });

  // redirect to products page
  exploreBooks();

}

</script>

<!-- ECOMMERCE EVENT FUNCTION -->

<script>

function trackAddToCart(product){

  gtag('event', 'add_to_cart', {

    currency: 'INR',

    value: parseInt(product.price.replace('₹','')),

    items: [{

      item_name: product.name,

      item_category: 'Books',

      price: parseInt(product.price.replace('₹','')),

      quantity: 1

    }]

  });

  viewProduct(product);

}

</script>

<script src="script.js"></script>

</body>
</html>
