<!DOCTYPE html>
<html>
<head>

<!-- CONSENT MODE -->
<script>

window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

// ✅ Default consent
gtag('consent', 'default', {
  analytics_storage: 'denied',
  ad_storage: 'denied'
});

// ✅ EARLY CONSENT RESTORE
const analytics = localStorage.getItem("analyticsConsent");
const ads = localStorage.getItem("adsConsent");

if (analytics !== null && ads !== null) {

  gtag('consent', 'update', {

    analytics_storage: analytics === "true" ? 'granted' : 'denied',

    ad_storage: ads === "true" ? 'granted' : 'denied'

  });

}

</script>

<!-- GOOGLE ANALYTICS GTAG.JS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-F3B00ZEY0V"></script>

<script>

window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

gtag('js', new Date());

gtag('config', 'G-F3B00ZEY0V');


// ✅ PAGEVIEW EVENT

gtag('event', 'page_view', {

  page_location: window.location.href,

  page_path: window.location.pathname

});

</script>

<title>Books</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <div class="container nav">

    <h1>📚 Books</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Books</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>

</header>

<section>

  <div class="container">

    <h2>Books Collection</h2>

    <div class="grid">

      <!-- BOOK 1 -->

      <div class="card">

        <img src="thinkandgrow.png">

        <h3>Think and Grow Rich</h3>

        <button onclick="trackViewItem({
          name: 'Think and Grow Rich',
          price: 1000,
          img: 'thinkandgrow.png'
        })">

          View

        </button>

        <button onclick="trackAddToCart({
          name: 'Think and Grow Rich',
          price: 1000
        })">

          Add to Cart

        </button>

      </div>

      <!-- BOOK 2 -->

      <div class="card">

        <img src="ikigai.jpg">

        <h3>Ikigai</h3>

        <button onclick="trackViewItem({
          name: 'Ikigai',
          price: 299,
          img: 'ikigai.jpg'
        })">

          View

        </button>

        <button onclick="trackAddToCart({
          name: 'Ikigai',
          price: 299
        })">

          Add to Cart

        </button>

      </div>

      <!-- BOOK 3 -->

      <div class="card">

        <img src="alchemist.jpg">

        <h3>The Alchemist</h3>

        <button onclick="trackViewItem({
          name: 'The Alchemist',
          price: 500,
          img: 'alchemist.jpg'
        })">

          View

        </button>

        <button onclick="trackAddToCart({
          name: 'The Alchemist',
          price: 500
        })">

          Add to Cart

        </button>

      </div>

    </div>

  </div>

</section>

<!-- CONSENT BANNER -->

<div id="consent-banner" style="
position: fixed;
bottom: 0;
width: 100%;
background: #222;
color: #fff;
padding: 15px;
z-index: 9999;
">

  <p>Manage your cookie preferences</p>

  <label>
    <input type="checkbox" id="analyticsConsent">
    Enable Analytics Cookies
  </label>

  <br>

  <label>
    <input type="checkbox" id="adsConsent">
    Enable Advertising Cookies
  </label>

  <br><br>

  <button onclick="acceptAll()">Accept All</button>

  <button onclick="rejectAll()">Reject All</button>

  <button onclick="savePreferences()">Save Preferences</button>

</div>

<footer>

  <p>© 2026 BookStore</p>

</footer>

<!-- VIEW ITEM EVENT -->

<script>

function trackViewItem(product){

  gtag('event', 'view_item', {

    currency: 'INR',

    value: product.price,

    items: [{

      item_name: product.name,

      item_category: 'Books',

      price: product.price,

      quantity: 1

    }]

  });

  viewProduct(product);

}

</script>

<!-- ADD TO CART EVENT -->

<script>

function trackAddToCart(product){

  gtag('event', 'add_to_cart', {

    currency: 'INR',

    value: product.price,

    items: [{

      item_name: product.name,

      item_category: 'Books',

      price: product.price,

      quantity: 1

    }]

  });

  addToCart(product);

}

</script>

<script src="script.js"></script>

</body>
</html>
