<!DOCTYPE html>
<html>
<head>

<!-- CONSENT MODE -->
<script>

window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

// ✅ Default consent
gtag('consent', 'default', {
  analytics_storage: 'denied',
  ad_storage: 'denied'
});

// ✅ EARLY CONSENT RESTORE
const analytics = localStorage.getItem("analyticsConsent");
const ads = localStorage.getItem("adsConsent");

if (analytics !== null && ads !== null) {

  gtag('consent', 'update', {

    analytics_storage: analytics === "true" ? 'granted' : 'denied',

    ad_storage: ads === "true" ? 'granted' : 'denied'

  });

}

</script>

<!-- GOOGLE ANALYTICS GTAG.JS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-F3B00ZEY0V"></script>

<script>

window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

gtag('js', new Date());

gtag('config', 'G-F3B00ZEY0V');


// ✅ PAGEVIEW EVENT

gtag('event', 'page_view', {

  page_title: document.title,

  page_location: window.location.href,

  page_path: window.location.pathname

});

</script>

<title>Contact</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <div class="container nav">

    <h1>Contact Us</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Books</a>
    </nav>

  </div>

</header>

<section>

  <div class="container">

    <h2>Get in Touch</h2>

    <!-- FORM SUBMIT -->

    <form onsubmit="submitFormTracking(event)">

      <input type="text" id="userName" placeholder="Name" required>

      <input type="email" id="userEmail" placeholder="Email" required>

      <button type="submit">Submit</button>

    </form>

  </div>


  <!-- CTA BUTTONS -->

  <button onclick="trackBtn1()">
    Button 1
  </button>

  <button onclick="trackBtn2()">
    Button 2
  </button>

</section>

<!-- CONSENT BANNER -->

<div id="consent-banner" style="
position: fixed;
bottom: 0;
width: 100%;
background: #222;
color: #fff;
padding: 15px;
z-index: 9999;
">

  <p>Manage your cookie preferences</p>

  <label>
    <input type="checkbox" id="analyticsConsent">
    Enable Analytics Cookies
  </label>

  <br>

  <label>
    <input type="checkbox" id="adsConsent">
    Enable Advertising Cookies
  </label>

  <br><br>

  <button onclick="acceptAll()">Accept All</button>

  <button onclick="rejectAll()">Reject All</button>

  <button onclick="savePreferences()">Save Preferences</button>

</div>

<footer>

  <p>© 2026 BookStore</p>

</footer>

<script src="script.js"></script>

<script>

// ===============================
// FORM SUBMIT TRACKING
// ===============================

function submitFormTracking(event){

  event.preventDefault();

  const userName = document.getElementById("userName").value;

  const userEmail = document.getElementById("userEmail").value;


  // ✅ LEAD EVENT

  gtag('event', 'generate_lead', {

    form_name: 'Contact Form',

    user_name: userName,

    user_email: userEmail

  });

  // Existing form function
  submitForm(event);

}


// ===============================
// CTA BUTTON 1 TRACKING
// ===============================

function trackBtn1(){

  gtag('event', 'btn1', {

    cta_text: 'Explore Books'

  });

  console.log("btn1 fired");

}


// ===============================
// CTA BUTTON 2 TRACKING
// ===============================

function trackBtn2(){

  gtag('event', 'btn2', {

    cta_text: 'Buy Now',

    section_name: 'Hero Banner'

  });

  console.log("btn2 fired");

}

</script>

</body>
</html>
