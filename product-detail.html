<!DOCTYPE html>
<html>
<head>

<!-- CONSENT MODE -->
<script>

window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

// ✅ Default consent
gtag('consent', 'default', {
  analytics_storage: 'denied',
  ad_storage: 'denied'
});

// ✅ EARLY CONSENT RESTORE
const analytics = localStorage.getItem("analyticsConsent");
const ads = localStorage.getItem("adsConsent");

if (analytics !== null && ads !== null) {

  gtag('consent', 'update', {

    analytics_storage: analytics === "true" ? 'granted' : 'denied',

    ad_storage: ads === "true" ? 'granted' : 'denied'

  });

}
<script src="https://assets.adobedtm.com/ee2879bff7d5/df66f513b55d/launch-edc03d9cfeaf-development.min.js" async></script>
</script>

<!-- GOOGLE ANALYTICS GTAG.JS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-F3B00ZEY0V"></script>

<script>

window.dataLayer = window.dataLayer || [];

function gtag(){
  dataLayer.push(arguments);
}

gtag('js', new Date());

gtag('config', 'G-F3B00ZEY0V', {
  send_page_view: false,
  debug_mode: true
});


// ✅ PAGEVIEW EVENT
gtag('event', 'page_view', {
page_location: window.location.href,
page_path: window.location.pathname
});


</script>

<title>Book Detail</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <div class="container nav">

    <h1>📚 Book Detail</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Books</a>
    </nav>

  </div>

</header>

<section>

  <div class="container">

    <div class="product">

      <img id="product-img">

      <div>

        <h2 id="product-name"></h2>

        <p id="product-price"></p>

        <!-- ADD TO CART EVENT -->
        <button onclick="trackAddToCart()">
          Add to Cart
        </button>

        <!-- PURCHASE EVENT -->
        <button onclick="trackPurchase()">
          Buy Now
        </button>

      </div>

    </div>

  </div>

</section>

<!-- CONSENT BANNER -->

<div id="consent-banner" style="
position: fixed;
bottom: 0;
width: 100%;
background: #222;
color: #fff;
padding: 15px;
z-index: 9999;
">

  <p>Manage your cookie preferences</p>

  <label>
    <input type="checkbox" id="analyticsConsent">
    Enable Analytics Cookies
  </label>

  <br>

  <label>
    <input type="checkbox" id="adsConsent">
    Enable Advertising Cookies
  </label>

  <br><br>

  <button onclick="acceptAll()">Accept All</button>

  <button onclick="rejectAll()">Reject All</button>

  <button onclick="savePreferences()">Save Preferences</button>

</div>

<footer>

  <p>© 2026 BookStore</p>

</footer>

<script src="script.js"></script>

<script>

// ✅ PRODUCT DATA LOAD + VIEW ITEM EVENT

window.addEventListener("DOMContentLoaded", function () {

  const params = new URLSearchParams(window.location.search);

  const productName = params.get("name");

  const productPrice = parseInt(params.get("price"));

  const productImg = params.get("img");


  document.getElementById("product-name").innerText = productName;

  document.getElementById("product-price").innerText = "Price: ₹" + productPrice;

  document.getElementById("product-img").src = productImg;


  // ✅ VIEW ITEM EVENT

  gtag('event', 'view_item', {

    currency: 'INR',

    value: productPrice,

    items: [{

      item_name: productName,

      item_category: 'Books',

      price: productPrice,

      quantity: 1

    }]

  });

});


// ✅ ADD TO CART EVENT

function trackAddToCart(){

  const productName = document.getElementById("product-name").innerText;

  const productPrice = parseInt(
    document.getElementById("product-price")
    .innerText
    .replace("Price: ₹","")
  );

  gtag('event', 'add_to_cart', {

    currency: 'INR',

    value: productPrice,

    items: [{

      item_name: productName,

      item_category: 'Books',

      price: productPrice,

      quantity: 1

    }]

  });

  addToCart();

}


// ✅ PURCHASE EVENT

function trackPurchase(){

  const productName = document.getElementById("product-name").innerText;

  const productPrice = parseInt(
    document.getElementById("product-price")
    .innerText
    .replace("Price: ₹","")
  );

  gtag('event', 'purchase', {

    transaction_id: 'TXN_' + new Date().getTime(),

    currency: 'INR',

    value: productPrice,

    items: [{

      item_name: productName,

      item_category: 'Books',

      price: productPrice,

      quantity: 1

    }]

  });

  buyNow();

}

</script>

</body>
</html>
